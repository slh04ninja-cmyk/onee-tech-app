<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Signal Extractor — Code</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Source Sans Pro', sans-serif; background: #0e1117; color: #fafafa; }
.header { padding: 2rem 2rem 0; }
.header h1 { font-size: 2rem; background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: rgba(255,255,255,0.6); margin-top: 0.3rem; }
.layout { display: flex; gap: 2rem; padding: 1.5rem 2rem; }
.main { flex: 2; }
.sidebar { flex: 1; background: #161b22; border-radius: 12px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); height: fit-content; }
.sidebar h3 { margin-bottom: 1rem; }
.sidebar .status { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem; border-radius: 8px; margin-bottom: 0.8rem; font-size: 0.85rem; }
.status.ok { background: rgba(76,175,80,0.15); color: #81C784; }
.card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; padding: 1.5rem; }
.card h3 { margin-bottom: 1rem; }
.info-banner { background: rgba(25,118,210,0.1); border: 1px solid rgba(25,118,210,0.3); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 1rem; font-size: 0.9rem; color: #64B5F6; }
.input-group { margin-bottom: 1rem; }
.input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 0.3rem; }
.input-group input { width: 100%; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; font-size: 1.1rem; letter-spacing: 0.3em; text-align: center; }
.btn-row { display: flex; gap: 1rem; margin-top: 1rem; }
.btn { padding: 0.7rem 1.5rem; border-radius: 8px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,215,0,0.3); }
.btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.btn-secondary:hover { background: rgba(255,255,255,0.15); }
.divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1rem 0; }
.slider-group { margin: 1rem 0; }
.slider-group label { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
.slider-group input[type=range] { width: 100%; margin: 0.4rem 0; accent-color: #FFD700; }
.slider-value { font-weight: 700; color: #FFD700; }
</style>
</head>
<body>

<div class="header">
  <h1>🏆 Gold Signal Extractor</h1>
  <p>Extrait les signaux de trading depuis Telegram → CSV pour backtesting MT5.</p>
</div>

<div class="layout">
  <div class="main">
    <div class="card">
      <h3>🔑 Code de vérification</h3>
      <div class="info-banner">📨 Code envoyé à <strong>+212XXXXXXXXX</strong></div>
      <div class="input-group">
        <label>Entre le code reçu</label>
        <input type="text" placeholder="12345">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary">✅ Vérifier</button>
        <button class="btn btn-secondary">↩️ Retour</button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <h3>⚙️ Configuration</h3>
    <div class="status ok">✅ Identifiants Telegram chargés depuis .env</div>
    <hr class="divider">
    <h3>📊 Paramètres</h3>
    <div class="slider-group">
      <label>Jours d'historique</label>
      <input type="range" min="7" max="90" value="30">
      <span class="slider-value">30</span>
    </div>
  </div>
</div>

</body>
</html>
